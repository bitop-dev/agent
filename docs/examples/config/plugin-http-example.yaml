defaultProfile: web-local
approvalMode: on-request
plugins:
  send-email:
    enabled: true
    config:
      baseURL: http://127.0.0.1:8091
      apiKey: local-test-key
      provider: smtp
      smtpHost: mail.privateemail.com
      smtpPort: 465
      username: support@bitop.dev
      password: CHANGE_ME
      from: support@bitop.dev

  web-research:
    enabled: true
    config:
      baseURL: http://127.0.0.1:8092
      provider: internal
      apiKey: local-test-key

  spawn-sub-agent:
    enabled: false
    config:
      maxDepth: 2
      maxAgents: 4
