apiVersion: agent/v1
kind: Profile
metadata:
  name: readonly
  version: 0.1.0
  description: Minimal read-only example profile
spec:
  instructions:
    system:
      - ./prompts/system.md
  provider:
    default: mock
    model: echo
  tools:
    enabled:
      - core/read
  approval:
    mode: never
    requireFor: []
  workspace:
    required: true
    writeScope: read-only
  session:
    persistence: sqlite
    compaction: auto
  policy:
    overlays: []
