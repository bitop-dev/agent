apiVersion: agent/v1
kind: Profile
metadata:
  name: coding
  version: 0.1.0
  description: Coding-oriented example profile for local repositories
spec:
  instructions:
    system:
      - ./prompts/system.md
  provider:
    default: openai
    model: nemotron-3-super-120b-a12b
  tools:
    enabled:
      - core/read
      - core/write
      - core/edit
      - core/bash
  approval:
    mode: on-request
    requireFor:
      - core/bash
  workspace:
    required: true
    writeScope: workspace
  session:
    persistence: sqlite
    compaction: auto
  policy:
    overlays:
      - ./policy/default.yaml
